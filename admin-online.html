<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>INTERDEE · 在线管理后台</title>
  <link rel="stylesheet" href="admin.css"><link rel="stylesheet" href="admin-overrides.css"><link rel="stylesheet" href="admin-online.css"><link rel="stylesheet" href="admin-import.css">
</head>
<body>
  <section class="online-login" id="loginView" hidden>
    <form class="login-card" id="loginForm"><p class="kicker">INTERDEE</p><h1>在线管理后台</h1><p>请使用管理员邮箱和密码登录。</p><label>邮箱<input name="email" type="email" required></label><label>密码<input name="password" type="password" required></label><button class="primary" type="submit">登录后台</button><p class="login-error" id="loginError"></p></form>
  </section>
  <div class="admin-shell" id="onlineApp">
    <aside class="sidebar"><div class="admin-brand"><span>好</span><div><strong>INTERDEE</strong><small>在线管理后台</small></div></div><nav><button class="active" data-view="catalogue">▦ 商品与库存</button><button data-view="layout">✦ 页面与排版</button><button data-view="orders">☷ 客户预留 <i id="newOrderBadge">0</i></button></nav><div class="sidebar-bottom"><a href="index.html" target="_blank">↗ 打开法语前台</a><button id="logoutButton">退出登录</button></div></aside>
    <main class="admin-main">
      <section class="admin-view active" id="view-catalogue"><div class="view-head"><div><p class="kicker">CATALOGUE</p><h1>商品与库存</h1><p>修改后立即同步到顾客网页。</p></div><button class="primary" id="addProduct">＋ 新增商品</button></div><div class="stats-grid" id="statsGrid"></div><div class="panel"><div class="panel-head"><h2>商品列表</h2><input id="productSearch" placeholder="搜索款号、品类或颜色"></div><div class="table-scroll"><table class="online-table"><thead><tr><th>商品</th><th>品类</th><th>价格</th><th>库存</th><th>状态</th><th>操作</th></tr></thead><tbody id="productRows"></tbody></table></div></div></section>
      <section class="admin-view" id="view-layout"><div class="view-head"><div><p class="kicker">DESIGN</p><h1>页面与排版</h1><p>编辑主页文字、Logo、主图视频和背景图片。</p></div></div><form class="panel settings-form" id="settingsForm"><div class="form-grid"><label>品牌名称<input name="brandName"></label><label>顶部公告<input name="notice"></label><label>主标题<input name="heroTitle"></label><label>粉色标题<input name="heroAccent"></label><label class="wide">主页介绍<textarea name="heroDescription"></textarea></label><label>商品区标题<input name="sectionTitle"></label><label>每行商品数量<select name="columns"><option>2</option><option>3</option><option>4</option></select></label><label>Logo 图片<input name="logoFile" type="file" accept="image/*"></label><label>主页主图或 MP4<input name="heroFile" type="file" accept="image/*,video/mp4"></label><label>流程区背景图<input name="howFile" type="file" accept="image/*"></label></div><button class="primary" type="submit">保存并更新前台</button></form></section>
      <section class="admin-view" id="view-orders"><div class="view-head"><div><p class="kicker">ORDERS</p><h1>客户预留</h1><p>顾客在线提交后会显示在这里；确认订单时扣减库存。</p></div><button class="secondary" id="refreshOrders">刷新</button></div><div class="order-list" id="orderList"></div></section>
    </main>
  </div>
  <dialog id="productDialog" class="online-dialog"><button class="close" id="closeProduct">×</button><form id="productForm"><h2 id="productDialogTitle">编辑商品</h2><div class="form-grid"><label>款号<input name="id" required></label><label>显示名称<input name="name" required></label><label>品类<select name="category"></select></label><label>成分<input name="composition"></label><label>原价 €<input name="original" type="number" min="0" step="0.01" required></label><label>折后价 €<input name="price" type="number" min="0" step="0.01" required></label><label>主商品图<input name="photo" type="file" accept="image/*"></label><label class="check"><input name="visible" type="checkbox" checked> 前台显示</label></div><div class="variant-head"><h3>颜色、尺码与库存</h3><button type="button" class="secondary" id="addColor">＋ 添加颜色</button></div><div id="variantRows"></div><button class="primary" type="submit">保存商品</button></form></dialog>
  <div class="toast" id="onlineToast" hidden></div>
<script src="supabase-config.js?v=20260710-1"></script><script src="cloud-api.js?v=20260710-2"></script><script src="inventory-import.js?v=20260713-import-fix"></script><script src="admin-online.js"></script>
</body></html>
